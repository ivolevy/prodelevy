    <polygon points="256,130 248,138 251,148 261,148 264,138" fill="none" stroke="#1a1a1a" stroke-width="2"/>
    <polygon points="222,108 216,116 219,124 227,124 230,116" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
