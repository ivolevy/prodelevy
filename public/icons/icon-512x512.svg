    <path d="M198,124 L314,124" fill="none" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round"/>
    <path d="M198,172 L314,172" fill="none" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round"/>

