    <polygon points="218,160 212,168 215,176 223,176 226,168" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
    <polygon points="294,160 288,168 291,176 299,176 302,168" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>

