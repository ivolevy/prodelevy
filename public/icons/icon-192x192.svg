<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#030307"/>
      <stop offset="100%" stop-color="#080c18"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="celesteGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
  </defs>
  
  <!-- Icon Background -->
  <rect width="192" height="192" rx="40" fill="url(#bgGrad)"/>
  
  <!-- Outer Gold Border -->
  <rect x="8" y="8" width="176" height="176" rx="32" fill="none" stroke="url(#goldGrad)" stroke-width="4"/>
  
  <!-- Inner Celeste Glow -->
  <rect x="14" y="14" width="164" height="164" rx="26" fill="none" stroke="url(#celesteGrad)" stroke-width="1.5" stroke-opacity="0.5"/>
  
  <!-- Trophy / Soccer Design Group -->
  <g transform="translate(46, 36)">
    <!-- Globe/Football Silhouette -->
    <circle cx="50" cy="40" r="30" fill="none" stroke="url(#celesteGrad)" stroke-width="2.5" stroke-dasharray="8 4"/>
    <path d="M 50 10 A 30 30 0 0 0 50 70" fill="none" stroke="url(#celesteGrad)" stroke-width="1.5"/>
    <path d="M 50 10 A 30 30 0 0 1 50 70" fill="none" stroke="url(#celesteGrad)" stroke-width="1.5"/>
    <line x1="20" y1="40" x2="80" y2="40" stroke="url(#celesteGrad)" stroke-width="1.5"/>
    
    <!-- Stylized Golden Cup Handles -->
    <path d="M 15 48 C 5 48 5 65 18 65" fill="none" stroke="url(#goldGrad)" stroke-width="3" stroke-linecap="round"/>
    <path d="M 85 48 C 95 48 95 65 82 65" fill="none" stroke="url(#goldGrad)" stroke-width="3" stroke-linecap="round"/>
    
    <!-- Golden Cup / Trophy Base -->
    <path d="M 28 45 L 35 75 L 65 75 L 72 45 Z" fill="url(#goldGrad)"/>
    <!-- Trophy Pedestal -->
    <rect x="30" y="78" width="40" height="8" rx="2" fill="url(#goldGrad)"/>
    <rect x="24" y="88" width="52" height="10" rx="3" fill="url(#goldGrad)"/>
    
    <!-- Stars -->
    <path d="M 15 15 L 17 21 L 23 21 L 18 25 L 20 31 L 15 27 L 10 31 L 12 25 L 7 21 L 13 21 Z" fill="url(#goldGrad)"/>
    <path d="M 85 15 L 87 21 L 93 21 L 88 25 L 90 31 L 85 27 L 80 31 L 82 25 L 77 21 L 83 21 Z" fill="url(#goldGrad)"/>
    <path d="M 50 2 L 51.5 6 L 56 6 L 52.5 9 L 54 13.5 L 50 11 L 46 13.5 L 47.5 9 L 44 6 L 48.5 6 Z" fill="url(#goldGrad)"/>
  </g>
</svg>
