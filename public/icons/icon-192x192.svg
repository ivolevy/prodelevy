<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="192" height="192">
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="#1a1a1a"/>

  <!-- World Cup Trophy - Golden Silhouette -->
  <g transform="translate(256,256) scale(1) translate(-256,-256)">
    <!-- Base plate -->
    <path d="M186,430 L326,430 C332,430 336,426 336,420 L336,408 C336,402 332,398 326,398 L186,398 C180,398 176,402 176,408 L176,420 C176,426 180,430 186,430 Z" fill="#c5a880"/>

    <!-- Base pedestal -->
    <path d="M196,398 L316,398 C322,398 326,394 326,388 L316,362 C314,356 308,352 300,352 L212,352 C204,352 198,356 196,362 L186,388 C186,394 190,398 196,398 Z" fill="#c5a880"/>

    <!-- Narrow stem -->
    <rect x="240" y="320" width="32" height="32" rx="4" fill="#c5a880"/>

    <!-- Trophy body - two sweeping arms holding the globe -->
    <path d="
      M240,320
      C242,300 236,270 218,245
      C205,228 192,218 185,200
      C178,182 180,162 192,148
      C204,134 220,138 230,152
      C240,166 248,190 252,210
      L260,210
      C264,190 272,166 282,152
      C292,138 308,134 320,148
      C332,162 334,182 327,200
      C320,218 307,228 294,245
      C276,270 270,300 272,320
      Z" fill="#c5a880"/>

    <!-- Globe/ball at top -->
    <circle cx="256" cy="138" r="56" fill="#c5a880"/>

    <!-- Globe panel lines to simulate soccer ball -->
    <path d="M256,82 C256,82 240,110 240,138 C240,166 256,194 256,194" fill="none" stroke="#1a1a1a" stroke-width="3"/>
    <path d="M256,82 C256,82 272,110 272,138 C272,166 256,194 256,194" fill="none" stroke="#1a1a1a" stroke-width="3"/>
    <path d="M200,138 L312,138" fill="none" stroke="#1a1a1a" stroke-width="3"/>
    <path d="M204,115 L308,115" fill="none" stroke="#1a1a1a" stroke-width="2.5"/>
    <path d="M204,161 L308,161" fill="none" stroke="#1a1a1a" stroke-width="2.5"/>

    <!-- Pentagon shapes on globe -->
    <path d="M256,120 L248,128 L252,138 L260,138 L264,128 Z" fill="none" stroke="#1a1a1a" stroke-width="2"/>
    <path d="M230,98 L222,106 L226,116 L234,116 L238,106 Z" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
    <path d="M282,98 L274,106 L278,116 L286,116 L290,106 Z" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
    <path d="M224,148 L216,156 L220,166 L228,166 L232,156 Z" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
    <path d="M288,148 L280,156 L284,166 L292,166 L296,156 Z" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>

    <!-- Flowing lines on body/arms -->
    <path d="M235,310 C238,290 232,260 222,242 C215,230 208,220 204,208" fill="none" stroke="#1a1a1a" stroke-width="2.5"/>
    <path d="M277,310 C274,290 280,260 290,242 C297,230 304,220 308,208" fill="none" stroke="#1a1a1a" stroke-width="2.5"/>

    <!-- Base detail lines -->
    <line x1="190" y1="414" x2="322" y2="414" stroke="#1a1a1a" stroke-width="2"/>
    <line x1="196" y1="375" x2="316" y2="375" stroke="#1a1a1a" stroke-width="2"/>
  </g>
</svg>
